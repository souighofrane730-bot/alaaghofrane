<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/base :: head('Modifier le bien')"></head>
<body>
<div th:replace="fragments/base :: navbar"></div>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-header bg-warning text-dark">
                    <h2 class="mb-0"><i class="bi bi-pencil-square"></i> Modifier le bien</h2>
                </div>
                <div class="card-body">
                    <form th:action="@{'/agent/biens/modifier/' + ${bien.id}}" th:object="${bien}" method="post">
                        <div class="mb-3">
                            <label for="titre" class="form-label">Titre</label>
                            <input type="text" class="form-control" id="titre" th:field="*{titre}" required>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label for="type" class="form-label">Type</label>
                                <select class="form-select" id="type" th:field="*{type}">
                                    <option th:each="t : ${T(com.fst.immobilier.entity.enums.TypeBien).values()}"
                                            th:value="${t}" th:text="${t}"></option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label for="ville" class="form-label">Ville</label>
                                <input type="text" class="form-control" id="ville" th:field="*{ville}" required>
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-4">
                                <label for="prix" class="form-label">Prix (DT)</label>
                                <input type="number" class="form-control" id="prix" th:field="*{prix}" required>
                            </div>
                            <div class="col-md-4">
                                <label for="surface" class="form-label">Surface (m²)</label>
                                <input type="number" class="form-control" id="surface" th:field="*{surface}" required>
                            </div>
                            <div class="col-md-4">
                                <label for="nbPieces" class="form-label">Nombre de pièces</label>
                                <input type="number" class="form-control" id="nbPieces" th:field="*{nbPieces}" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="description" class="form-label">Description</label>
                            <textarea class="form-control" id="description" th:field="*{description}" rows="4" required></textarea>
                        </div>

                        <div class="d-flex justify-content-between align-items-center mt-4">
                            <a th:href="@{/catalogue}" class="btn btn-outline-secondary">Annuler</a>
                            <button type="submit" class="btn btn-primary px-4">Enregistrer les modifications</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="fragments/base :: scripts"></div>
</body>
</html>
