<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/base :: head('Dashboard Admin')"></head>
<body>
<div th:replace="fragments/base :: navbar"></div>

<div class="container mt-4">
    <h2 class="mb-4">Dashboard Administrateur</h2>

    <div class="row">
        <div class="col-md-4">
            <div class="card text-white bg-primary mb-3 shadow-sm">
                <div class="card-header">Chiffre d'Affaires Simulé</div>
                <div class="card-body">
                    <h3 class="card-title" th:text="${stats.chiffreAffairesSimule + ' DT'}">0 DT</h3>
                    <p class="card-text">Total des biens vendus ou loués.</p>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card text-white bg-success mb-3 shadow-sm">
                <div class="card-header">Visites ce mois</div>
                <div class="card-body">
                    <h3 class="card-title" th:text="${stats.visitesMois}">0</h3>
                    <p class="card-text">Nombre de visites planifiées ou réalisées ce mois-ci.</p>
                </div>
            </div>
        </div>
    </div>

    <div class="card mt-4 shadow-sm">
        <div class="card-header bg-dark text-white">Répartition des Biens par Statut</div>
        <div class="card-body">
            <table class="table">
                <thead>
                    <tr>
                        <th>Statut</th>
                        <th>Nombre de biens</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="stat : ${stats.biensParStatut}">
                        <td th:text="${stat.statut}"></td>
                        <td th:text="${stat.count}"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div th:replace="fragments/base :: scripts"></div>
</body>
</html>
