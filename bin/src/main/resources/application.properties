# Configuration Serveur
server.port=8080

# Configuration MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/immobilier?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuration JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Configuration Data Initialization
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# Configuration File Upload (Multipart)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=50MB
spring.servlet.multipart.enabled=true

# Configuration Thymeleaf
spring.thymeleaf.cache=false

# Configuration Log
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Custom properties for file upload dir
app.upload.dir=uploads/
